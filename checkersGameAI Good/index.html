<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Checkers AI</h1>

      <div class="controls">
        <button id="restartBtn" type="button">Restart</button>
      </div>

      <div id="turnInfo" class="status">Turn: Human</div>
      <div id="message" class="message">Select a piece to move.</div>
            <strong id="capturedByHuman">0</strong>
            <strong id="capturedByAi">0</strong>

      </div>
    </section>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Checkers board"></div>
    </section>
  </main>

  <div id="winnerModal" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
      <h2 id="winnerTitle">Game Over</h2>
      <p id="winnerText">Winner: Human</p>
      <button id="modalRestartBtn" type="button">Play Again</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
